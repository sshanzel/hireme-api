name: Build and Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'infra/**'

env:
  PROJECT_ID: hiremedev
  REGION: europe-west1
  REGISTRY: europe-west1-docker.pkg.dev
  API_IMAGE: europe-west1-docker.pkg.dev/hiremedev/core-api/api
  WORKER_IMAGE: europe-west1-docker.pkg.dev/hiremedev/core-api/worker

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run migrations
        run: pnpm db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build API image
        run: |
          docker build \
            --platform linux/amd64 \
            --target runner \
            -t ${{ env.API_IMAGE }}:${{ github.sha }} \
            -t ${{ env.API_IMAGE }}:latest \
            .

      - name: Build Worker image
        run: |
          docker build \
            --platform linux/amd64 \
            --target worker \
            -t ${{ env.WORKER_IMAGE }}:${{ github.sha }} \
            -t ${{ env.WORKER_IMAGE }}:latest \
            .

      - name: Push images
        run: |
          docker push ${{ env.API_IMAGE }}:${{ github.sha }}
          docker push ${{ env.API_IMAGE }}:latest
          docker push ${{ env.WORKER_IMAGE }}:${{ github.sha }}
          docker push ${{ env.WORKER_IMAGE }}:latest

      - name: Setup Node.js for Pulumi
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install infra dependencies
        working-directory: infra
        run: pnpm install

      - name: Set image tag
        working-directory: infra
        run: pulumi config set imageTag ${{ github.sha }} --stack prod
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

      - name: Deploy with Pulumi
        uses: pulumi/actions@v5
        with:
          command: up
          stack-name: prod
          work-dir: infra
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

      - name: Show deployment URLs
        run: |
          echo "API URL:"
          gcloud run services describe core-api --region ${{ env.REGION }} --format 'value(status.url)'
          echo "Worker URL:"
          gcloud run services describe core-worker --region ${{ env.REGION }} --format 'value(status.url)'
